name: Nook
options:
  bundleIdPrefix: com.nook
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.0.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "12.0.0"

targets:
  Nook:
    type: application
    platform: iOS
    sources:
      - path: Nook
    settings:
      base:
        # Info.plist is hand-maintained (holds GIDClientID + the Google URL
        # scheme), so reference it statically instead of generating it.
        INFOPLIST_FILE: Nook/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: app.getnook
        # RevenueCat public SDK key (appl_…). Set per-developer/CI; safe to embed
        # (it's a public key), but keep the real value out of source control.
        REVENUECAT_API_KEY: "appl_fLNFmNnTOFwCYBdlzmSCRlapSDB"
        # AdMob app id (ca-app-pub-…~…) → Info.plist GADApplicationIdentifier.
        ADMOB_APP_ID: "ca-app-pub-5609964541403026~8159388740"
        # Real native ad unit id (ca-app-pub-…/…). Empty → test ads in DEBUG, no
        # ads in RELEASE. See AdConfig.
        ADMOB_NATIVE_UNIT_ID: "ca-app-pub-5609964541403026/6818917145"
        # Real anchored-adaptive banner unit (create one in AdMob). Empty → test
        # banner in DEBUG, no banner in RELEASE. See AdConfig.bannerUnitID.
        ADMOB_BANNER_UNIT_ID: ""
        # Comma-separated AdMob test-device hashes (printed by the SDK on first ad
        # request). Devices listed here get tappable TEST ads instead of live ones
        # — set this for any physical device you test on, leave empty for release.
        ADMOB_TEST_DEVICE_IDS: ""
        DEVELOPMENT_TEAM: 8PP9FS9CAY
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Nook/Nook.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: RevenueCat
        product: RevenueCat
      - package: GoogleMobileAds
        product: GoogleMobileAds
    # Local StoreKit testing for Nook Plus (lets you buy in the simulator with no
    # sandbox account). Must match the manual Nook.xcscheme reference. Set the
    # scheme's StoreKit Configuration to None for a real sandbox/webhook test.
    scheme:
      storeKitConfiguration: NookPlus.storekit
